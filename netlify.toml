[build]
  publish = "dist"
  command = "node build.js"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/ac-calculator/*"
  to = "/ac-calculator/:splat"
  status = 200

[[redirects]]
  from = "/engineering-notes/*"
  to = "/engineering-notes/:splat"
  status = 200

[[redirects]]
  from = "/ac-calculator"
  to = "/ac-calculator/index.html"
  status = 200

[[redirects]]
  from = "/engineering-notes"
  to = "/engineering-notes/index.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/ac-calculator/index.html"
  status = 302

[headers]
  for = "/ac-calculator/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

  for = "/engineering-notes/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000"